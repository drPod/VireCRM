name: codeql

# CodeQL advanced setup. Public repo, no GHAS license required.
# Language `javascript-typescript` combined since CodeQL CLI 2.16+.
# Query suite `security-and-quality` extends `security-extended` with
# maintainability + reliability queries (per github/codeql docs).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "23 7 * * 1"

jobs:
  analyze:
    name: analyze
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality
      - uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
