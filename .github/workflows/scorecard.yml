name: scorecard

# OpenSSF Scorecard. Public repo, no extra license required.
# Scores supply-chain hygiene (branch protection, pinned actions, dangerous workflow patterns,
# SAST coverage, signed releases, etc.) and uploads SARIF to the Security tab.
# Public results also publishable to the OpenSSF scorecard dataset; badge URL:
# https://api.securityscorecards.dev/projects/github.com/drPod/VireCRM/badge

on:
  branch_protection_rule:
  schedule:
    - cron: "37 5 * * 1"
  push:
    branches: [main]

permissions: read-all

jobs:
  analysis:
    name: analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: ossf/scorecard-action@v2
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true
      - uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
