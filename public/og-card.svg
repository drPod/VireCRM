<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F0C1C"/>
      <stop offset="100%" stop-color="#1B1330"/>
    </linearGradient>
    <radialGradient id="aurora1" cx="22%" cy="28%" r="40%">
      <stop offset="0%" stop-color="#6E5BCC" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#6E5BCC" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#6E5BCC" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="aurora2" cx="80%" cy="78%" r="42%">
      <stop offset="0%" stop-color="#C679BC" stop-opacity="0.45"/>
      <stop offset="60%" stop-color="#C679BC" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#C679BC" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="wordmark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8973E0"/>
      <stop offset="55%" stop-color="#A87BD4"/>
      <stop offset="100%" stop-color="#D88BC9"/>
    </linearGradient>
    <linearGradient id="rule" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6E5BCC" stop-opacity="0"/>
      <stop offset="50%" stop-color="#A87BD4" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#C679BC" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#aurora1)"/>
  <rect width="1200" height="630" fill="url(#aurora2)"/>

  <g opacity="0.5" filter="url(#glow)">
    <text x="600" y="282" text-anchor="middle"
          font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
          font-size="220" font-weight="900" letter-spacing="-6"
          fill="#6E5BCC">Majix</text>
  </g>

  <text x="600" y="282" text-anchor="middle"
        font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="220" font-weight="900" letter-spacing="-6"
        fill="url(#wordmark)">Majix</text>

  <line x1="320" y1="338" x2="880" y2="338" stroke="url(#rule)" stroke-width="2"/>

  <text x="600" y="400" text-anchor="middle"
        font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="38" font-weight="600" letter-spacing="-0.5"
        fill="#ECEAF1">AI CRM that follows up so your team can close.</text>

  <text x="600" y="446" text-anchor="middle"
        font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="22" font-weight="400" letter-spacing="0.2"
        fill="#A89BC4">Custom-built CRM &amp; AI sales systems — set up in days, not months.</text>

  <g transform="translate(600, 540)">
    <rect x="-90" y="-22" width="180" height="44" rx="22"
          fill="#6E5BCC" fill-opacity="0.12"
          stroke="#8973E0" stroke-opacity="0.45" stroke-width="1"/>
    <text x="0" y="7" text-anchor="middle"
          font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
          font-size="22" font-weight="600" letter-spacing="1"
          fill="#D88BC9">majix.ai</text>
  </g>
</svg>
